<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumiflo - Virtual Entertainment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #0a0a0a;
      width: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      position: relative;
      width: 100%;
      max-width: 943px;
    }
    .container img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <!-- 위쪽: 일반 이미지 -->
  <div class="container">
    <img src="VE_top.png" alt="Lumiflo VE - Top">
  </div>

  <!-- 아래쪽: 클릭 영역 이미지맵 -->
  <div class="container" id="bottom">
    <img id="main" src="VE_bottom.png" alt="Lumiflo VE - References" usemap="#vemap">
    <map name="vemap">
      <area shape="rect" coords="30,433,311,460"
            href="https://www.youtube.com/live/d6JMU5EJX7c?si=Mt1zte04Uhl2d9WO"
            target="_blank" alt="MY:RAKL YouTube">
      <area shape="rect" coords="329,433,611,460"
            href="https://youtu.be/QmycldYpVaM?si=WcsCUUzo4cUOSraX"
            target="_blank" alt="Plan.B Music YouTube">
      <area shape="rect" coords="629,433,909,460"
            href="https://youtube.com/shorts/qhMSbxEUyb8?si=Bt3s64XNZ09-aXLK"
            target="_blank" alt="Weekly Challenge YouTube">
      <area shape="rect" coords="753,504,885,554"
            href="https://lumiflo.channel.io/home"
            target="_blank" alt="문의하기">
    </map>
  </div>

  <script>
    const img = document.getElementById('main');
    const originalWidth = 943;
    const originalHeight = 590;

    function scaleMap() {
      const scaleX = img.offsetWidth / originalWidth;
      const scaleY = img.offsetHeight / originalHeight;

      const areas = document.querySelectorAll('map[name="vemap"] area');
      const origCoords = [
        [30,  433, 311, 460],
        [329, 433, 611, 460],
        [629, 433, 909, 460],
        [753, 504, 885, 554],
      ];

      areas.forEach((area, i) => {
        const [x1, y1, x2, y2] = origCoords[i];
        area.coords = [
          Math.round(x1 * scaleX),
          Math.round(y1 * scaleY),
          Math.round(x2 * scaleX),
          Math.round(y2 * scaleY),
        ].join(',');
      });
    }

    img.addEventListener('load', scaleMap);
    window.addEventListener('resize', scaleMap);
    if (img.complete) scaleMap();
  </script>
</body>
</html>
