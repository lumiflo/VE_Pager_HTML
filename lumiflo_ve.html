<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumiflo - Virtual Entertainment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #0a0a0a;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      position: relative;
      width: 100%;
      max-width: 1080px;
    }
    img#main {
      width: 100%;
      height: auto;
      max-height: 100vh;
      object-fit: contain;
      display: block;
    }
    .hotspot:hover {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="main" src="PAGER_HTML_45.png" alt="Lumiflo VE" usemap="#vemap">
    <map name="vemap">
      <area shape="rect" coords="242,1243,432,1263"
            href="https://www.youtube.com/live/d6JMU5EJX7c?si=Mt1zte04Uhl2d9WO"
            target="_blank" alt="MY:RAKL YouTube">
      <area shape="rect" coords="444,1243,635,1263"
            href="https://youtu.be/QmycldYpVaM?si=WcsCUUzo4cUOSraX"
            target="_blank" alt="Plan.B Music YouTube">
      <area shape="rect" coords="645,1243,836,1263"
            href="https://youtube.com/shorts/qhMSbxEUyb8?si=Bt3s64XNZ09-aXLK"
            target="_blank" alt="Weekly Challenge YouTube">
      <area shape="rect" coords="879,1298,983,1331"
            href="https://lumiflo.channel.io/home"
            target="_blank" alt="문의하기">
    </map>
  </div>

  <script>
    const img = document.getElementById('main');
    const originalWidth = 1080;
    const originalHeight = 1350;

    function scaleMap() {
      const scaleX = img.offsetWidth / originalWidth;
      const scaleY = img.offsetHeight / originalHeight;

      const areas = document.querySelectorAll('map[name="vemap"] area');
      const origCoords = [
        [242, 1243, 432, 1263],
        [444, 1243, 635, 1263],
        [645, 1243, 836, 1263],
        [879, 1298, 983, 1331],
      ];

      areas.forEach((area, i) => {
        const [x1, y1, x2, y2] = origCoords[i];
        area.coords = [
          Math.round(x1 * scaleX),
          Math.round(y1 * scaleY),
          Math.round(x2 * scaleX),
          Math.round(y2 * scaleY),
        ].join(',');
      });
    }

    img.addEventListener('load', scaleMap);
    window.addEventListener('resize', scaleMap);
    if (img.complete) scaleMap();
  </script>
</body>
</html>
